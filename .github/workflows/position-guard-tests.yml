name: Position Guard Tests

on:
  push:
    branches:
      - position-hysteresis-sizing-guard
      - dynamic-leverage-risk-budget
      - exit-reentry-profit-protection
      - candidate-upgrade-cycle-lock
      - adverse-selection-prophet-shadow
      - news-sentiment-shadow
      - performance-observability-ledger
      - pretrade-breakout-stopid-shadow-exit
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install focused test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest>=8.0 \
            pandas>=2.0 \
            numpy>=1.24 \
            python-dotenv \
            psycopg2-binary \
            hyperliquid-python-sdk \
            eth-account \
            requests

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Run strategy and safety regression tests
        run: |
          pytest -q \
            tests/test_strategy_core.py \
            tests/test_strategy_dynamic.py \
            tests/test_leverage_policy.py \
            tests/test_decision_gate.py \
            tests/test_candidate_upgrade.py \
            tests/test_candidate_upgrade_gate.py \
            tests/test_decision_guard.py \
            tests/test_execution_audit.py \
            tests/test_execution_policy.py \
            tests/test_minimum_order_sizing.py \
            tests/test_position_management.py \
            tests/test_worker_cycle_guard.py \
            tests/test_db_json_normalization.py \
            tests/test_entry_quality_policy.py \
            tests/test_profit_protection_overlay.py \
            tests/test_prophet_shadow.py \
            tests/test_forecaster_horizons.py \
            tests/test_shadow_candidate_selection.py \
            tests/test_news_sentiment_shadow.py \
            tests/test_performance_observability.py \
            tests/test_external_stop_detection.py \
            tests/test_pre_trade_revalidation.py \
            tests/test_severe_weakness_shadow.py \
            tests/test_external_close_reconciliation.py
